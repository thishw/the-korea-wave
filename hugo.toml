baseURL = "https://the-korea-wave.github.io/"
title = "The Korea Wave"
defaultContentLanguage = "en"
languageCode = "en-US"
enableRobotsTXT = true
timeZone = "Asia/Seoul"

# 홈에서 검색 색인(index.json) + LLM 인덱스(llms.txt) 생성 — media-hugo-shared 모듈 소비
[outputs]
  home = ["HTML", "RSS", "JSON", "llms"]

[outputFormats.llms]
  mediaType = "text/plain"
  baseName  = "llms"
  isPlainText = true

[params]
  site_key       = "the_korea_wave"
  tier           = "B"
  description    = "The business of Korean culture — industry and analysis coverage of K-pop, K-drama, and Korean entertainment, synthesized from multiple Korean sources."
  og_site_name   = "The Korea Wave"
  og_locale      = "en_US"
  logo           = "/brand/wordmark.svg"
  logo_dark      = "/brand/wordmark-dark.svg"
  og_image       = ""
  gtm_id         = "GTM-5B6XBNBH"
  # WP-49: GSC HTML 태그 인증 (Google 계정 단위 토큰 — 속성마다 다를 필요 없음)
  verify_google  = "EvHXpDorbbKE9CntN4aVXNtiENA4ilq7byW4ncIlBSw"
  # WP-55: 네이버 서치어드바이저 HTML 태그 인증 (프로퍼티별 토큰 — 사이트마다 다름)
  verify_naver   = "c5cf2d3548fea0abbc9a9c0ff3a143d1f0107d17"
  verify_bing    = ""
  adsense_pub_id = ""
  daum_verification = ""
  show_term_chips = true
  accent_color   = "#7048e8"
  # i18n (WP-64): media-hugo-shared 라벨 파라미터 — 영문 매체용 값
  date_format               = "January 2, 2006"
  label_home                = "Home"
  label_search              = "Search"
  label_search_placeholder  = "Search articles…"
  label_recent              = "Recent Articles"
  label_categories          = "Categories"
  label_all_categories      = "← All Categories"
  label_related             = "Related Articles"
  label_no_posts            = "No articles in this category."
  label_count_suffix        = " articles"
  label_llms_posts_heading  = "Articles"
  label_taxonomy_desc       = "Browse articles by category."
  label_taxonomy_empty      = "No categories yet."
  label_read_more           = "Read more →"
  label_prev                = "← Previous"
  label_next                = "Next →"
  label_pagination          = "Pagination"

[pagination]
  pagerSize = 12

[taxonomies]
  category = "categories"
  keyword  = "keywords"

[[menu.main]]
  name   = "Home"
  url    = "/"
  weight = 1

[[menu.main]]
  name   = "Categories"
  url    = "/categories/"
  weight = 2

[[menu.main]]
  name   = "About"
  url    = "/about/"
  weight = 3

[[menu.main]]
  name   = "Contact"
  url    = "/contact/"
  weight = 4

[markup.goldmark.renderer]
  unsafe = true

[module]
  [[module.imports]]
    path = "github.com/thishw/media-hugo-shared"
